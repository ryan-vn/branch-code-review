interface:
  display_name: "Branch Code Review"
  short_description: "Multi-agent branch review with bug hunting"
  default_prompt: "Use $branch-code-review in multi-agent mode. Run context collection, dispatch Impact + Bug Hunt (+ Security when applicable) agents in parallel, optionally Bugbot and verification on large branches, merge findings into a single report with bugs first. Use single-agent fallback only if the user asks for a quick review."
